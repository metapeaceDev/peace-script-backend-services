[pytest]
# Pytest configuration for Peace Script Model Backend
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore legacy tests directory
norecursedirs = _legacy_tests_disabled .git __pycache__ *.egg-info venv

# Async settings
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for different test categories
markers =
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
    auth: Authentication tests
